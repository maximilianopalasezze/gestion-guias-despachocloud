spring.application.name=gestion-guias-despacho-cloud
server.port=${SERVER_PORT:8080}

# Ruta base donde se montara EFS en EC2.
# En local usa /tmp/efs-guias para poder probar sin AWS.
app.efs.base-path=${EFS_BASE_PATH:/tmp/efs-guias}
app.efs.guias-path=${app.efs.base-path}/guias-temporales

# Base de datos H2 guardada dentro de EFS para mantener historial entre reinicios.
spring.datasource.url=jdbc:h2:file:${app.efs.base-path}/db/guiasdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# AWS S3. En local puedes dejar AWS_S3_ENABLED=false.
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.s3.enabled=${AWS_S3_ENABLED:false}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}
efs.base-path=${EFS_BASE_PATH:/mnt/efs/guias}

# Tamano maximo de respuesta/archivo si se usa descarga directa.
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
