spring.application.name=gestion-guias-despacho-cloud
server.port=${SERVER_PORT:8080}

# Ruta base donde se montará EFS en EC2.
# En local usa /tmp/efs-guias para poder probar sin AWS.
app.efs.base-path=${EFS_BASE_PATH:/tmp/efs-guias}
app.efs.guias-path=${app.efs.base-path}/guias-temporales

# Base de datos H2 guardada dentro de EFS para mantener historial entre reinicios.
spring.datasource.url=jdbc:h2:file:${app.efs.base-path}/db/guiasdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Consola H2 desactivada por defecto por seguridad.
# Para habilitarla localmente: H2_CONSOLE_ENABLED=true
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# AWS S3. En local puedes dejar AWS_S3_ENABLED=false.
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:}
aws.s3.enabled=${AWS_S3_ENABLED:false}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}

# Mantener esta propiedad porque puede estar siendo usada por algún servicio del proyecto.
efs.base-path=${EFS_BASE_PATH:/mnt/efs/guias}

# Tamaño máximo de respuesta/archivo si se usa descarga directa.
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Azure AD B2C: validación de access tokens JWT.
# Estos valores corresponden al tenant, flujo y API que acabamos de configurar.
app.security.b2c.jwk-set-uri=${AZURE_B2C_JWK_SET_URI:https://tallercloudnative1.b2clogin.com/tallercloudnative1.onmicrosoft.com/B2C_1_gestion_guias/discovery/v2.0/keys}
app.security.b2c.issuer=${AZURE_B2C_ISSUER:https://tallercloudnative1.b2clogin.com/858fc5c4-4d14-449c-988b-c3af598aca2a/v2.0/}
app.security.b2c.audience=${AZURE_B2C_AUDIENCE:b1b65384-d1c0-4f6a-a2b5-ea648ae9fafb}
app.security.b2c.policy=${AZURE_B2C_POLICY:B2C_1_gestion_guias}