services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: guias-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: duoc
      RABBITMQ_DEFAULT_PASS: duoc123
    volumes:
      - rabbitmq_guias_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  guias-productor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guias-productor
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: duoc
      RABBITMQ_PASSWORD: duoc123
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  guias-consumidor:
    build:
      context: ./consumidor-guias
      dockerfile: Dockerfile
    container_name: guias-consumidor
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: duoc
      RABBITMQ_PASSWORD: duoc123
      AWS_REGION: us-east-1
      AWS_S3_ENABLED: false
      AWS_S3_BUCKET_NAME:
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rabbitmq_guias_data: