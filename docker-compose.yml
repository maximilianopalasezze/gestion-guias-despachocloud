services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: guias-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: duoc
      RABBITMQ_DEFAULT_PASS: duoc123
    volumes:
      - rabbitmq_guias_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  guias-productor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guias-productor
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-ec2}"

      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "duoc"
      RABBITMQ_PASSWORD: "duoc123"

      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_S3_ENABLED: "${AWS_S3_ENABLED:-true}"
      AWS_S3_BUCKET_NAME: "${AWS_S3_BUCKET_NAME:-guias-despacho-cloud-maximiliano}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"

      APP_SECURITY_B2C_JWK_SET_URI: "${APP_SECURITY_B2C_JWK_SET_URI:-https://tallercloudnative1.b2clogin.com/tallercloudnative1.onmicrosoft.com/b2c_1_gestion_guias/discovery/v2.0/keys}"
      APP_SECURITY_B2C_ISSUER: "${APP_SECURITY_B2C_ISSUER:-https://tallercloudnative1.b2clogin.com/tfp/858fc5c4-4d14-449c-988b-c3af598aca2a/b2c_1_gestion_guias/v2.0/}"
      APP_SECURITY_B2C_AUDIENCE: "${APP_SECURITY_B2C_AUDIENCE:-b1b65384-d1c0-4f6a-a2b5-ea648ae9fafb}"
      APP_SECURITY_B2C_POLICY: "${APP_SECURITY_B2C_POLICY:-b2c_1_gestion_guias}"

    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  guias-consumidor:
    build:
      context: ./consumidor-guias
      dockerfile: Dockerfile
    container_name: guias-consumidor
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-ec2}"

      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "duoc"
      RABBITMQ_PASSWORD: "duoc123"

      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_S3_ENABLED: "${AWS_S3_ENABLED:-true}"
      AWS_S3_BUCKET_NAME: "${AWS_S3_BUCKET_NAME:-guias-despacho-cloud-maximiliano}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"

      APP_SECURITY_B2C_JWK_SET_URI: "${APP_SECURITY_B2C_JWK_SET_URI:-https://tallercloudnative1.b2clogin.com/tallercloudnative1.onmicrosoft.com/b2c_1_gestion_guias/discovery/v2.0/keys}"
      APP_SECURITY_B2C_ISSUER: "${APP_SECURITY_B2C_ISSUER:-https://tallercloudnative1.b2clogin.com/tfp/858fc5c4-4d14-449c-988b-c3af598aca2a/b2c_1_gestion_guias/v2.0/}"
      APP_SECURITY_B2C_AUDIENCE: "${APP_SECURITY_B2C_AUDIENCE:-b1b65384-d1c0-4f6a-a2b5-ea648ae9fafb}"
      APP_SECURITY_B2C_POLICY: "${APP_SECURITY_B2C_POLICY:-b2c_1_gestion_guias}"

    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rabbitmq_guias_data: