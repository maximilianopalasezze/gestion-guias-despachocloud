name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: maxem7240/gestion-guias-despachocloud

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compilar proyecto con Maven
        run: mvn -B clean package -DskipTests

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Desplegar aplicacion en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Verificando Docker..."
            docker --version

            echo "Descargando imagen exacta del commit..."
            docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

            echo "Deteniendo contenedor anterior si existe..."
            docker stop gestion-guias || true
            docker rm gestion-guias || true

            echo "Verificando carpeta EFS montada en EC2..."
            ls -la /home/ec2-user/efs || true
            df -h | grep efs || true

            echo "Ejecutando contenedor de la version actual..."
            docker run -d \
              --name gestion-guias \
              --restart=always \
              -p 8080:8080 \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e AWS_S3_BUCKET_NAME="${{ secrets.AWS_S3_BUCKET_NAME }}" \
              -e AWS_S3_ENABLED=true \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              -e AZURE_B2C_JWK_SET_URI="https://tallercloudnative1.b2clogin.com/tallercloudnative1.onmicrosoft.com/B2C_1_gestion_guias/discovery/v2.0/keys" \
              -e AZURE_B2C_ISSUER="https://tallercloudnative1.b2clogin.com/tfp/858fc5c4-4d14-449c-988b-c3af598aca2a/b2c_1_gestion_guias/v2.0/" \
              -e AZURE_B2C_AUDIENCE="b1b65384-d1c0-4f6a-a2b5-ea648ae9fafb" \
              -e AZURE_B2C_POLICY="B2C_1_gestion_guias" \
              -e EFS_BASE_PATH="/mnt/efs/guias" \
              -v /home/ec2-user/efs:/mnt/efs/guias \
              ${{ env.IMAGE_NAME }}:${{ github.sha }}

            echo "Contenedor desplegado correctamente."
            docker ps

            echo "Verificando variables Azure B2C del contenedor..."
            docker inspect gestion-guias \
              --format '{{range .Config.Env}}{{println .}}{{end}}' \
              | grep '^AZURE_B2C' || true

            echo "Verificando issuer incluido en el JAR..."
            docker exec gestion-guias sh -c \
              'unzip -p /app/app.jar BOOT-INF/classes/application.properties | grep app.security.b2c.issuer' || true