name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: maxem7240/gestion-guias-despachocloud

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compilar proyecto con Maven
        run: mvn -B clean package -DskipTests

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Desplegar aplicacion en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Descargando imagen desde Docker Hub..."
            docker pull ${{ env.IMAGE_NAME }}:latest

            echo "Deteniendo contenedor anterior si existe..."
            docker stop gestion-guias || true
            docker rm gestion-guias || true

            echo "Creando carpeta EFS si no existe..."
            sudo mkdir -p /mnt/efs/guias
            sudo chmod -R 777 /mnt/efs/guias

            echo "Ejecutando nuevo contenedor..."
            docker run -d \
              --name gestion-guias \
              --restart=always \
              -p 8080:8080 \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }} \
              -e AWS_S3_ENABLED=true \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e EFS_BASE_PATH=/mnt/efs/guias \
              -v /mnt/efs/guias:/mnt/efs/guias \
              ${{ env.IMAGE_NAME }}:latest

            echo "Contenedor desplegado correctamente."
            docker ps