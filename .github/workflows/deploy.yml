name: Build and Deploy Cloud Native EFT

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compilar microservicio productor
        run: mvn -B clean package -DskipTests

      - name: Compilar microservicio consumidor
        working-directory: consumidor-guias
        run: mvn -B clean package -DskipTests

      - name: Validar archivos Docker
        run: |
          test -f Dockerfile
          test -f docker-compose.yml
          test -f consumidor-guias/Dockerfile
          echo "Archivos Docker verificados correctamente."

      - name: Desplegar en EC2 con Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Verificando Docker..."
            docker --version
            docker compose version

            echo "Preparando carpeta del proyecto..."
            cd /home/ec2-user

            if [ ! -d "gestion-guias-despachocloud" ]; then
              git clone https://github.com/maximilianopalasezze/gestion-guias-despachocloud.git
            fi

            cd gestion-guias-despachocloud

            echo "Actualizando codigo desde main..."
            git fetch origin
            git checkout main
            git pull origin main

            echo "Creando archivo .env para despliegue cloud..."
            cat > .env <<EOF
            SPRING_PROFILES_ACTIVE=ec2

            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_S3_ENABLED=true
            AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}

            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}

            APP_SECURITY_B2C_JWK_SET_URI=${{ secrets.APP_SECURITY_B2C_JWK_SET_URI }}
            APP_SECURITY_B2C_ISSUER=${{ secrets.APP_SECURITY_B2C_ISSUER }}
            APP_SECURITY_B2C_AUDIENCE=${{ secrets.APP_SECURITY_B2C_AUDIENCE }}
            APP_SECURITY_B2C_POLICY=${{ secrets.APP_SECURITY_B2C_POLICY }}
            EOF

            echo "Deteniendo contenedores anteriores..."
            docker compose down || true

            echo "Construyendo y levantando productor, consumidor y RabbitMQ..."
            docker compose up -d --build

            echo "Estado de contenedores:"
            docker compose ps

            echo "Logs productor:"
            docker compose logs --tail=40 guias-productor

            echo "Logs consumidor:"
            docker compose logs --tail=40 guias-consumidor

            echo "Despliegue finalizado correctamente."